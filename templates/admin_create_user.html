{% extends "base.html" %}
{% block title %}Kullanıcı Oluştur{% endblock %}
{% block content %}
<section class="card auth-card">
  <h1>Yeni Kullanıcı Oluştur</h1>
  <p class="muted">Oluşan hesabın başlangıç şifresi ortam ayarından alınır ve ilk girişte değişimi zorunludur.</p>
  <form method="post" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Kullanıcı Adı</label>
    <input type="text" name="username" minlength="3" maxlength="64" required>
    <button class="btn" type="submit">Oluştur</button>
  </form>
</section>
{% endblock %}
