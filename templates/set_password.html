{% extends "base.html" %}
{% block title %}Şifre Belirleme{% endblock %}
{% block content %}
<section class="card auth-card">
  <h1>Şifrenizi Belirleyin</h1>
  <p class="muted">İlk girişte şifrenizi yenilemeniz zorunludur.</p>
  <form method="post" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label>Mevcut Şifre</label>
    <div class="password-wrap">
      <input id="current-password" type="password" name="current_password" required autocomplete="current-password">
      <button type="button" class="btn btn-outline reveal-btn" data-target="current-password" data-mode="toggle">🙈 Göster</button>
    </div>

    <label>Yeni Şifre</label>
    <div class="password-wrap">
      <input id="new-password" type="password" name="new_password" required autocomplete="new-password">
      <button type="button" class="btn btn-outline reveal-btn" data-target="new-password" data-mode="toggle">🙈 Göster</button>
    </div>
    <label>Yeni Şifre Tekrar</label>
    <input type="password" name="confirm_password" required autocomplete="new-password">

    <button class="btn" type="submit">Şifreyi Kaydet</button>
  </form>
</section>
{% endblock %}
